commands:
  install: ./.factory/init.sh
  test: sh -c '.venv-mission/bin/python -m pytest tests/services/test_watch_api_baseline.py tests/services/test_watch_digest_service.py tests/services/test_mini_auth_session_boundary.py -v && npm --prefix mini run test'
  lint: npm --prefix mini run validate
  typecheck: npm --prefix mini run validate
  build: npm --prefix mini run build
  mini_upload_dry_run: npm --prefix mini run upload:wechat -- --dry-run
  mini_preflight: npm --prefix mini run preflight
  mini_install: test -f mini/package.json && npm --prefix mini install || echo mini-package-not-yet-created
  mini_validate: test -f mini/package.json && (npm --prefix mini run validate || npm --prefix mini run build || npm --prefix mini run lint) || echo mini-package-not-yet-created

services:
  mongodb:
    start: echo mongodb-must-be-provided-locally-on-27017
    stop: echo leaving-local-mongodb-untouched
    healthcheck: python3 -c "import socket; s=socket.create_connection(('127.0.0.1',27017),2); s.close()"
    port: 27017
    depends_on: []

  redis:
    start: echo redis-must-be-provided-locally-on-6379
    stop: echo leaving-local-redis-untouched
    healthcheck: .venv-mission/bin/python -c "from redis import Redis; client = Redis(host='127.0.0.1', port=6379, password='tradingagents123', decode_responses=True); assert client.ping() is True"
    port: 6379
    depends_on: []

  backend:
    start: >-
      sh -c 'mkdir -p .logs &&
      PORT=8001 .venv-mission/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 > .logs/mission-backend-8001.log 2>&1 &
      echo $! > .logs/mission-backend-8001.pid'
    stop: >-
      sh -c 'if [ -f .logs/mission-backend-8001.pid ]; then
        pid=$(cat .logs/mission-backend-8001.pid);
        if kill -0 "$pid" 2>/dev/null; then
          kill "$pid";
        fi;
        rm -f .logs/mission-backend-8001.pid;
      else
        echo no-managed-backend-pid-for-8001;
      fi'
    healthcheck: curl -sf http://localhost:8001/api/health
    port: 8001
    depends_on: [mongodb, redis]

  frontend:
    start: npm --prefix frontend run dev -- --host 0.0.0.0 --port 3000
    stop: fuser -k 3000/tcp || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: [backend]
